<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Vault</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.page{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transition:.5s;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(.95);
}

.logo{
width:220px;
margin-bottom:20px;
}

h1{
font-size:60px;
letter-spacing:5px;
margin-bottom:35px;
text-shadow:0 0 20px white;
}

.neonBtn{

padding:16px 55px;
border-radius:50px;
border:2px solid white;
background:transparent;
color:white;
font-size:22px;
cursor:pointer;
transition:.3s;

}

.neonBtn:hover{

box-shadow:
0 0 10px white,
0 0 25px white,
0 0 60px white;

}

.games{

display:flex;
gap:45px;
flex-wrap:wrap;
justify-content:center;

}

.card{

width:300px;
height:180px;
overflow:hidden;
border:3px solid white;
border-radius:18px;
cursor:pointer;
transition:.35s;

}

.card:hover{

box-shadow:
0 0 10px white,
0 0 25px white,
0 0 45px white;

transform:scale(1.04);

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

.infoImg{

width:650px;
max-width:90%;
border:2px solid white;
border-radius:18px;
margin-bottom:30px;

}

.instructions{

font-size:24px;
text-align:center;
margin-bottom:35px;
line-height:45px;

}

</style>

</head>
<body>

<canvas id="bg"></canvas>

<!-- HOME -->

<div id="home" class="page">

<img class="logo" src="https://i.ibb.co/r2cmH8r5/5-CFD85-E5-71-A2-4179-B126-9-E9-A5-E98399-E.png">

<h1>The Vault</h1>

<button class="neonBtn" onclick="openGames()">Continue</button>

</div>

<!-- GAME PAGE -->

<div id="games" class="page hidden">

<div class="games">

<div class="card" onclick="openInfo()">

<img src="https://i.ibb.co/PG4JLY65/Blox-Fruits.jpg">

</div>

<div class="card" onclick="openInfo()">

<img src="https://i.ibb.co/Pzjv1n9p/blade-ball-roblox.avif">

</div>

<div class="card" onclick="openInfo()">

<img src="https://i.ibb.co/NdKf6TMy/roblox-da-hood-codes-2.avif">

</div>

</div>

</div>

<!-- INFO -->

<div id="info" class="page hidden">

<img class="infoImg" src="https://i.ibb.co/jkcy4jNz/The-Vault-PROJECT.jpg">

<div class="instructions">

Join our Discord server.<br>

Go to the designated channel.<br>

DM the manager to purchase or trade products.

</div>

<button class="neonBtn"

onclick="window.location.href='https://discord.gg/CkjjFyX3cw'">

Continue

</button>

</div>

<script>

function openGames(){

home.classList.add("hidden");
games.classList.remove("hidden");

}

function openInfo(){

games.classList.add("hidden");
info.classList.remove("hidden");

}

//////////////////////////////////////////////////////////
// CONSTELLATION EFFECT
//////////////////////////////////////////////////////////

const canvas=document.getElementById("bg");

const ctx=canvas.getContext("2d");

let w=canvas.width=window.innerWidth;

let h=canvas.height=window.innerHeight;

window.onresize=()=>{

w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;

}

let mouse={x:w/2,y:h/2};

window.onmousemove=e=>{

mouse.x=e.clientX;
mouse.y=e.clientY;

}

let pts=[];

for(let i=0;i<45;i++){

pts.push({

x:mouse.x,

y:mouse.y,

vx:0,

vy:0

});

}

function animate(){

ctx.clearRect(0,0,w,h);

pts[0].x+=(mouse.x-pts[0].x)*0.25;
pts[0].y+=(mouse.y-pts[0].y)*0.25;

for(let i=1;i<pts.length;i++){

pts[i].x+=(pts[i-1].x-pts[i].x)*0.35;
pts[i].y+=(pts[i-1].y-pts[i].y)*0.35;

}

for(let i=0;i<pts.length;i++){

ctx.beginPath();

ctx.arc(pts[i].x,pts[i].y,2,0,6.28);

ctx.fillStyle="white";

ctx.shadowBlur=15;

ctx.shadowColor="white";

ctx.fill();

}

ctx.beginPath();

ctx.strokeStyle="rgba(255,255,255,.45)";

ctx.lineWidth=1;

for(let i=0;i<pts.length;i++){

ctx.lineTo(pts[i].x,pts[i].y);

}

ctx.stroke();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
