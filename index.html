<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#000; --fg:#fff; }
    html,body{background:#000;color:#fff;margin:0;min-height:100vh;font-family:"Satoshi","Outfit",sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}
    .font-display{font-family:"Outfit",sans-serif;}
    .glow-text{text-shadow:0 0 18px rgba(255,255,255,.45),0 0 40px rgba(255,255,255,.15);}
    .glow-img{filter:drop-shadow(0 0 16px rgba(255,255,255,.4));}
    .vault-bg{background:radial-gradient(circle at 50% 30%,rgba(255,255,255,.06),transparent 55%),#000;}
    ::selection{background:#fff;color:#000;}
    input{background:transparent;border:0;border-bottom:1px solid rgba(255,255,255,.2);color:#fff;padding:12px 0;width:100%;font-size:14px;outline:none;transition:border-color .2s;}
    input::placeholder{color:rgba(255,255,255,.25);}
    input:focus{border-color:#fff;}
    label{display:block;text-align:left;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px;}
    .btn{width:100%;text-transform:uppercase;letter-spacing:.2em;font-size:12px;padding:16px;transition:all .2s;cursor:pointer;}
    .btn-primary{background:#fff;color:#000;border:0;font-weight:500;}
    .btn-primary:hover{background:rgba(255,255,255,.8);}
    .btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.25);}
    .btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.05);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both;}
    .hidden{display:none!important;}
  </style>
</head>
<body class="vault-bg">
  <!-- API base: change if serving statically from another domain -->
  <script>
    const API = (window.REACT_APP_BACKEND_URL || location.origin) + "/api";
  </script>

  <!-- ===== LANDING ===== -->
  <section id="landing" class="min-h-screen w-full flex flex-col items-center justify-center px-6 text-center">
    <div class="flex flex-col items-center fade-up">
      <img src="https://i.ibb.co/NdNy7Yzr/5-CFD85-E5-71-A2-4179-B126-9-E9-A5-E98399-E.png" alt="The Vault" class="glow-img" style="width:128px;height:128px;object-fit:contain;" />
      <h1 class="font-display glow-text mt-8 text-4xl sm:text-6xl font-light uppercase" style="letter-spacing:.35em;">The Vault</h1>
      <p class="mt-5 text-xs sm:text-sm uppercase text-white/40" style="letter-spacing:.35em;">Members Only</p>
    </div>
    <div class="mt-16 w-full max-w-xs flex flex-col gap-4 fade-up">
      <button class="btn btn-outline" onclick="show('signin')">Sign In</button>
      <button class="btn btn-primary" onclick="show('signup')">Sign Up</button>
    </div>
  </section>

  <!-- ===== SIGN UP ===== -->
  <section id="signup" class="hidden min-h-screen w-full flex-col items-center justify-center px-6">
    <div class="w-full max-w-sm flex flex-col items-center fade-up">
      <img src="https://i.ibb.co/NdNy7Yzr/5-CFD85-E5-71-A2-4179-B126-9-E9-A5-E98399-E.png" class="glow-img" style="width:64px;height:64px;object-fit:contain;cursor:pointer;" onclick="show('landing')" />
      <h1 class="font-display glow-text mt-6 text-2xl sm:text-3xl font-light uppercase" style="letter-spacing:.25em;">Create Account</h1>
      <form class="w-full mt-10 flex flex-col gap-6" onsubmit="return doRegister(event)">
        <div><label>Username</label><input id="su-username" type="text" placeholder="Your name" required /></div>
        <div><label>Email address</label><input id="su-email" type="email" placeholder="you@example.com" required /></div>
        <div><label>Password</label><input id="su-password" type="password" placeholder="••••••••" required /></div>
        <p id="su-error" class="text-left text-xs text-red-400 hidden"></p>
        <button class="btn btn-primary" type="submit">Create Account</button>
      </form>
      <p class="mt-8 text-xs text-white/40">Already a member? <a class="text-white underline cursor-pointer" onclick="show('signin')">Sign In</a></p>
    </div>
  </section>

  <!-- ===== SIGN IN ===== -->
  <section id="signin" class="hidden min-h-screen w-full flex-col items-center justify-center px-6">
    <div class="w-full max-w-sm flex flex-col items-center fade-up">
      <img src="https://i.ibb.co/NdNy7Yzr/5-CFD85-E5-71-A2-4179-B126-9-E9-A5-E98399-E.png" class="glow-img" style="width:64px;height:64px;object-fit:contain;cursor:pointer;" onclick="show('landing')" />
      <h1 class="font-display glow-text mt-6 text-2xl sm:text-3xl font-light uppercase" style="letter-spacing:.25em;">Log In</h1>
      <form class="w-full mt-10 flex flex-col gap-6" onsubmit="return doLogin(event)">
        <div><label>Email address</label><input id="si-email" type="email" placeholder="you@example.com" required /></div>
        <div><label>Password</label><input id="si-password" type="password" placeholder="••••••••" required /></div>
        <p id="si-error" class="text-left text-xs text-red-400 hidden"></p>
        <button class="btn btn-primary" type="submit">Log In</button>
      </form>
      <div class="w-full flex items-center gap-4 my-8">
        <div class="h-px flex-1 bg-white/15"></div>
        <span class="text-[10px] uppercase text-white/30" style="letter-spacing:.3em;">Or</span>
        <div class="h-px flex-1 bg-white/15"></div>
      </div>
      <button class="btn btn-outline" onclick="googleLogin()">Continue with Google</button>
      <p class="mt-8 text-xs text-white/40">New here? <a class="text-white underline cursor-pointer" onclick="show('signup')">Create an account</a></p>
    </div>
  </section>

  <!-- ===== COMING SOON / VAULT ===== -->
  <section id="vault" class="hidden min-h-screen w-full flex-col items-center justify-center px-6 py-16 text-center relative">
    <div class="absolute top-6 right-6">
      <button class="text-[10px] uppercase text-white/40 hover:text-white border border-white/15 hover:border-white/40 px-4 py-2" style="letter-spacing:.25em;" onclick="doLogout()">Log Out</button>
    </div>
    <div class="flex flex-col items-center fade-up">
      <img src="https://i.ibb.co/NdNy7Yzr/5-CFD85-E5-71-A2-4179-B126-9-E9-A5-E98399-E.png" class="glow-img mb-8 opacity-80" style="width:48px;height:48px;object-fit:contain;" />
      <img src="https://i.ibb.co/KcnPWRDK/C41-DF0-DC-3-F4-B-492-B-9-D63-B001-EB853-F9-F.png" alt="The Vault — shipping your product" class="glow-img w-full max-w-sm object-contain" />
      <h1 class="font-display glow-text mt-10 text-3xl sm:text-4xl font-light uppercase" style="letter-spacing:.3em;">The Vault</h1>
      <p class="mt-4 text-sm uppercase text-white/70" style="letter-spacing:.3em;">Shipping Your Product</p>
      <p id="vault-welcome" class="mt-3 text-xs text-white/40 max-w-xs" style="letter-spacing:.15em;">Thank you for ordering from The Vault.</p>
      <p class="mt-10 text-[10px] uppercase text-white/25" style="letter-spacing:.4em;">Shop coming soon</p>
    </div>
  </section>

  <script>
    function show(id){
      ["landing","signup","signin","vault"].forEach(s=>{
        const el=document.getElementById(s);
        el.classList.toggle("hidden",s!==id);
        el.classList.toggle("flex",s===id);
      });
      window.scrollTo(0,0);
    }
    function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.remove("hidden");}
    function hideErr(id){document.getElementById(id).classList.add("hidden");}

    async function api(path,body){
      const res=await fetch(API+path,{method:"POST",credentials:"include",headers:{"Content-Type":"application/json"},body:body?JSON.stringify(body):undefined});
      const data=await res.json().catch(()=>({}));
      if(!res.ok) throw (data.detail||"Something went wrong.");
      return data;
    }

    async function doRegister(e){
      e.preventDefault();hideErr("su-error");
      try{
        const u=await api("/auth/register",{username:su_username.value,email:su_email.value,password:su_password.value});
        enterVault(u);
      }catch(err){showErr("su-error",typeof err==="string"?err:"Registration failed.");}
      return false;
    }
    async function doLogin(e){
      e.preventDefault();hideErr("si-error");
      try{
        const u=await api("/auth/login",{email:si_email.value,password:si_password.value});
        enterVault(u);
      }catch(err){showErr("si-error",typeof err==="string"?err:"Login failed.");}
      return false;
    }
    async function doLogout(){try{await api("/auth/logout");}catch(_){}show("landing");}
    function enterVault(u){
      document.getElementById("vault-welcome").textContent=(u&&u.username?("Welcome, "+u.username+". "):"")+"Thank you for ordering from The Vault.";
      show("vault");
    }
    function googleLogin(){
      // REMINDER: DO NOT HARDCODE THE URL, OR ADD ANY FALLBACKS OR REDIRECT URLS, THIS BREAKS THE AUTH
      const redirectUrl=window.location.origin+window.location.pathname;
      window.location.href="https://auth.emergentagent.com/?redirect="+encodeURIComponent(redirectUrl);
    }

    // Handle Google OAuth return (session_id in URL fragment) + existing session
    (async function init(){
      const m=(location.hash||"").match(/session_id=([^&]+)/);
      if(m){
        try{const u=await api("/auth/session",{session_id:decodeURIComponent(m[1])});history.replaceState(null,"",location.pathname);return enterVault(u);}catch(_){history.replaceState(null,"",location.pathname);}
      }
      try{const res=await fetch(API+"/auth/me",{credentials:"include"});if(res.ok){return enterVault(await res.json());}}catch(_){}
      show("landing");
    })();
  </script>
</body>
</html>
