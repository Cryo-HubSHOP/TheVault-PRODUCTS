<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Da Hood Shop</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    text-align:center;
    padding:50px;
    background:#171717;
}

h1{
    font-size:45px;
    color:#00ffae;
}

.discord{
    display:inline-block;
    margin-top:20px;
    padding:15px 35px;
    background:#5865F2;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.discord:hover{
    transform:scale(1.05);
}

.container{
    max-width:1100px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#1b1b1b;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.info{
    padding:20px;
}

.price{
    color:#00ff99;
    font-size:22px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:gray;
}
</style>

</head>
<body>

<header>

<h1>🔥 Da Hood Shop 🔥</h1>

<p>Trusted Seller • Fast Delivery • Robux Only</p>

<a class="discord" href="https://discord.gg/TONLIEN" target="_blank">
Rejoindre le Discord
</a>

</header>

<div class="container">

<div class="card">
<img src="images/cybervehicle.png">
<div class="info">
<h2>Cyber Vehicle</h2>
<p>Value : 10,000</p>
<p class="price">200 Robux</p>
</div>
</div>

<div class="card">
<img src="images/bitcoinwallet.png">
<div class="info">
<h2>Bitcoin Wallet</h2>
<p>Value : 5,000</p>
<p class="price">100 Robux</p>
</div>
</div>

<div class="card">
<img src="images/pigwallet.png">
<div class="info">
<h2>Pig Wallet</h2>
<p>Value : 4,000</p>
<p class="price">80 Robux</p>
</div>
</div>

<div class="card">
<img src="images/soulknife.png">
<div class="info">
<h2>Soul Knife</h2>
<p>Value : 3,500</p>
<p class="price">70 Robux</p>
</div>
</div>

</div>

<footer>

© 2026 Da Hood Shop

</footer>

</body>
</html>
